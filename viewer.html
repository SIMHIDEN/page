<!DOCTYPE html>
<html>
<head>
  <title>Forti Knowledge Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
      background-color: #0D0E10;
      color: #E0E0E0;
    }
    
    h2 {
      color: #C0392B;
      border-bottom: 2px solid #3C4049;
      padding-bottom: 10px;
    }

    .entry {
      background: #1A1C20;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 5px solid #27AE60;
      white-space: pre-wrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .pretrained {
      border-left-color: #2980B9;
    }

    button {
      background-color: #2980B9;
      color: white;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-danger {
      background-color: #C0392B;
    }

    .btn-warning {
      background-color: #E67E22;
    }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3C4049; padding-bottom: 10px; margin-bottom: 20px;">
      <h2 style="margin: 0; border: none; padding: 0;">Knowledge Base</h2>
      <div style="display: flex; gap: 10px;">
        <button id="exportBtn" style="background-color: #8E44AD;">Export</button>
        <button id="importBtn" style="background-color: #D35400;">Import</button>
        <input type="file" id="importFile" accept=".md,.txt" style="display: none;" />
        <button id="clearBtn" class="btn-warning">Clear Knowledge</button>
        <button id="purgeBtn" class="btn-danger">Purge All Data</button>
        <button onclick="window.close()" class="btn-danger">Close</button>
      </div>
  </div>
  
  <div id="content">Loading...</div>

  <script src="viewer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>FortiClient Configuration</title>
  <style>
    body {
      width: 340px;
      padding: 15px;
      font-family: sans-serif;
      background-color: #0D0E10;
      color: #E0E0E0;
    }
    
    h3 {
      margin-top: 0;
      color: #C0392B;
      border-bottom: 1px solid #3C4049;
      padding-bottom: 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
    }

    select, input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      background-color: #1A1C20;
      border: 1px solid #3C4049;
      color: #FFF;
      box-sizing: border-box;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #2980B9;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #27AE60;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 11px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #219150;
    }

    .status {
      margin-top: 10px;
      font-size: 11px;
      min-height: 15px;
      text-align: center;
      color: #2980B9;
    }

    .info {
      font-size: 10px;
      color: #666;
      margin-top: 15px;
      border-top: 1px solid #3C4049;
      padding-top: 10px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    input[type="checkbox"] {
      margin-right: 8px;
    }
    
    .section-divider {
      margin-top: 15px;
      border-top: 1px solid #3C4049;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <h3>FortiDLP Pro v3.0</h3>
  
  <label for="apiKey">Groq API Key</label>
  <input type="password" id="apiKey" placeholder="gsk_..." style="font-family: monospace;">

  <label for="primaryModel">Primary Groq Model</label>
  <input type="text" id="primaryModel" placeholder="openai/gpt-oss-120b" style="font-family: monospace;">

  <label for="fallbackModel">Fallback Groq Model</label>
  <input type="text" id="fallbackModel" placeholder="llama-3.1-8b-instant" style="font-family: monospace;">

  <label for="providerOrder">Provider Order</label>
  <select id="providerOrder">
    <option value="groq,ollama">Groq -> Ollama</option>
    <option value="ollama,groq">Ollama -> Groq</option>
  </select>

  <div class="checkbox-container">
    <input type="checkbox" id="fallbackCheckbox" checked>
    <label for="fallbackCheckbox" style="margin: 0; cursor: pointer;">Enable Fallback</label>
  </div>

  <div class="checkbox-container">
    <input type="checkbox" id="arbitrationCheckbox">
    <label for="arbitrationCheckbox" style="margin: 0; cursor: pointer;">Dual-Model Weighted Arbitration</label>
  </div>

  <label for="ollamaUrl">Ollama URL</label>
  <input type="text" id="ollamaUrl" placeholder="http://localhost:11434/api/chat" style="font-family: monospace;">

  <label for="ollamaModel">Ollama Model</label>
  <input type="text" id="ollamaModel" placeholder="llama3.1:8b" style="font-family: monospace;">

  <div class="checkbox-container">
    <input type="checkbox" id="debugCheckbox">
    <label for="debugCheckbox" style="margin: 0; cursor: pointer;">Console Logs (for debugging)</label>
  </div>
  
  <button id="saveBtn">Update Policy</button>
  
  <div class="section-divider">
    <button id="trainBtn" style="background-color: #2980B9; margin-bottom: 5px;">Train Knowledge Base</button>
    <button id="viewBtn" style="background-color: #1ABC9C;">View Knowledge</button>
  </div>

  <div id="status" class="status"></div>

  <div class="info">
    <div><strong>Status:</strong> <span style="color: #27AE60">Online</span></div>
    <div style="margin-top: 5px;"><strong>Moodle:</strong> Ctrl+Click or Ctrl+Shift+Y</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

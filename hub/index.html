<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./hub.css" />
    <title>Page Hub</title>
  </head>
  <body>
    <main class="shell">
      <section class="glass-card hero" aria-label="Hub intro">
        <p class="eyebrow">Page Hub</p>
        <h1>Minimal mobile hub</h1>
        <p class="subtitle">
          Clean soft-brown landing with glass surfaces. Enter the game from here.
        </p>
        <a class="primary-cta" href="./imposter/">Open Imposter</a>
      </section>

      <section class="glass-card info-grid" aria-label="Hub details">
        <article>
          <h2>Design mode</h2>
          <p>Soft brown palette, subtle blur, and lightweight depth for mobile readability.</p>
        </article>
        <article>
          <h2>Structure</h2>
          <p>This hub lives at <code>/page/</code>, while the game runs at <code>/page/imposter/</code>.</p>
        </article>
      </section>
    </main>
  </body>
</html>
